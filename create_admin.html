<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://kit.fontawesome.com/b782cf5553.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="css/auth.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Admin Account</title>
</head>
<body>
    <div class="message" id="message"></div>

    <div class="header">
        <a href="index.html">
            <div class="logo_cont">QuickTrack</div>
        </a>
    </div>

    <div class="hero">
        <div class="container form_cont">
            <div class="form_box">
                <form id="admin_form" action="create_admin.php" method="POST" autocomplete="off">
                    <div class="cent">
                        <h1>Create Store Admin Account</h1>

                        <div class="input_group">
                            <input type="text" placeholder="Full Name" name="name" required>
                        </div>
                        <div class="input_group">
                            <input type="email" placeholder="Email" name="email" autocomplete="off" required>
                        </div>
                        <div class="input_group">
                            <input type="tel" placeholder="Phone Number" name="phone" required>
                        </div>
                        <div class="input_group">
                            <input type="text" placeholder="Store Name" name="store_name" required>
                        </div>
                        <div class="input_group">
                            <input type="text" placeholder="Store Address" name="store_address" required>
                        </div>
                        <div class="input_group">
                            <input type="password" placeholder="Password (1 uppercase, 1 special character)" name="password" pattern="^(?=.*[A-Z])(?=.*[@&^*]).{8,}$" required>
                        </div>
                        <div class="input_group">
                            <input type="password" placeholder="Confirm Password" name="confirm_password" required>
                        </div>

                        <button type="submit" id="submit_btn">Create Account</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/process_admin.js"></script>
</body>
</html>
